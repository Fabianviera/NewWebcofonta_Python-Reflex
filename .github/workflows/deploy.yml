name: Deploy to Reflex Cloud

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Reflex Cloud
        env:
          REFLEX_CLOUD_TOKEN: ${{ secrets.REFLEX_CLOUD_TOKEN }}
        run: reflex deploy --token "$REFLEX_CLOUD_TOKEN" --no-input
